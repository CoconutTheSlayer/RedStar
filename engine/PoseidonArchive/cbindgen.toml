# cbindgen config — generates include/poseidon_archive.h from src/lib.rs.
language = "C"
include_guard = "POSEIDON_ARCHIVE_H"
cpp_compat = true
tab_width = 4
documentation_style = "c99"
header = """/* PoseidonArchive — C ABI for reading OFP/Poseidon PBO archives.
 *
 * GENERATED by cbindgen from src/lib.rs — do not edit by hand.
 * Regenerated on every build; run `cargo build` (or the CMake build) to refresh.
 *
 * Backed by the standalone papa-bear-archive crate. Ownership: the handle from
 * pa_pbo_open*() is freed only by pa_pbo_close(); extracted bytes are copied into
 * the caller's buffer. Strings from pa_pbo_entry_name()/pa_last_error() are owned
 * by the library — do not free them. */"""

[export]
prefix = ""

[parse]
parse_deps = false
