# cbindgen config — generates include/poseidon_rust.h from src/lib.rs.
# C output with a C++-compatible extern "C" guard so the same header serves both.
language = "C"
include_guard = "POSEIDON_RUST_H"
cpp_compat = true
tab_width = 4
documentation_style = "c99"
header = """/* PoseidonRust — C ABI for the Rust toolchain spike.
 *
 * GENERATED by cbindgen from src/lib.rs — do not edit by hand.
 * Regenerated on every build; run `cargo build` (or the CMake build) to refresh.
 *
 * Ownership: any pointer returned by this API is owned by Rust and must be
 * released through the matching free function here, never the C/C++ allocator. */"""

[export]
# Emit integer `pub const`s (e.g. PRS_ABI_VERSION) as #define so they can be used
# in the preprocessor and compared cheaply from C/C++.
prefix = ""

[defines]

[parse]
parse_deps = false
